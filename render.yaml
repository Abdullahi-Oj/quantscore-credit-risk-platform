services:
  - type: web
    name: quantscore-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    envVars:
      - key: QUANTSCORE_API_KEY
        sync: false
      - key: QUANTSCORE_DATABASE_URL
        value: sqlite:///./quantscore.db